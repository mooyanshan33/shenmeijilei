<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>审美积累</title>
    <style>
      @font-face {
        font-family: "JianLu";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/JianLu90.ttf") format("truetype");
      }

      @font-face {
        font-family: "ICVE";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("/fonts/ICVE.ttf") format("truetype");
      }

      :root {
        /* Grays (韩系极简灰白色阶) */
        --c-white: #ffffff;
        --c-gray-50: #f7f7f7;
        --c-gray-100: #f5f5f5;
        --c-gray-200: #e5e5e5;
        --c-gray-300: #d4d4d4;
        --c-gray-400: #9ca3af; /* = gray-400-ish */
        --c-gray-500: #6b7280; /* 次文字 */
        --c-gray-600: #4b5563;
        --c-ink: #1f1f1f; /* 主文字 */

        /* Typography */
        --font-sans: "JianLu", "ICVE", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";

        /* Radius (柔和) */
        --radius-xs: 10px;
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 22px;

        /* Spacing */
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;

        /* Motion */
        --ease-out: cubic-bezier(0.2, 0.9, 0.2, 1);
        --duration-quick: 180ms;
        --duration-ui: 240ms;
      }

      #bg-pattern {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-color: var(--c-white);
        /*
          subtle pattern: 极淡“波点 + 五线谱线”
          - opacity <= 0.05
          - 可平铺
          - 不影响阅读
        */
        background-image:
          radial-gradient(circle at 1px 1px, rgba(31, 31, 31, 0.035) 1px, transparent 1.2px),
          linear-gradient(to bottom, rgba(31, 31, 31, 0.028) 1px, transparent 1px);
        background-size: 22px 22px, 24px 24px;
        background-position: 0 0, 0 6px;
        background-repeat: repeat;
      }
      
      html.dark #bg-pattern {
        background-color: #0b0b0b;
        background-image:
          radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.045) 1px, transparent 1.2px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 22px 22px, 24px 24px;
        background-position: 0 0, 0 6px;
        background-repeat: repeat;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background: var(--c-white);
        color: var(--c-ink);
        -webkit-overflow-scrolling: touch; /* iOS 风格滚动 */
        overscroll-behavior-y: none; /* 禁止回弹导致的闪烁 */
        overflow-x: hidden;
      }

      #boot-skeleton {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: transparent;
      }

      .boot-bar {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(31, 31, 31, 0.06);
      }

      .boot-content {
        flex: 1;
        padding: var(--space-5) var(--space-4);
        display: flex;
        flex-direction: column;
        gap: var(--space-4);
      }

      .boot-title {
        height: 18px;
        width: 46%;
        border-radius: 999px;
        background: rgba(31, 31, 31, 0.06);
      }

      .boot-search {
        height: 44px;
        border-radius: var(--radius-md);
        background: rgba(31, 31, 31, 0.04);
        border: 1px solid rgba(31, 31, 31, 0.05);
      }

      .boot-list {
        display: flex;
        flex-direction: column;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(31, 31, 31, 0.06);
        overflow: hidden;
      }

      .boot-row {
        padding: 14px var(--space-4);
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.75);
      }

      .boot-row + .boot-row {
        border-top: 1px solid rgba(31, 31, 31, 0.045);
      }

      .boot-icon {
        width: 26px;
        height: 26px;
        border-radius: 10px;
        background: rgba(31, 31, 31, 0.07);
      }

      .boot-line {
        height: 12px;
        border-radius: 999px;
        background: rgba(31, 31, 31, 0.07);
      }

      .boot-line.sm {
        width: 42%;
        opacity: 0.7;
      }

      .boot-line.md {
        width: 62%;
      }

      .boot-line.lg {
        width: 78%;
      }

      .boot-tabbar {
        height: 84px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-top: 1px solid rgba(31, 31, 31, 0.06);
      }
    </style>
  </head>
  <body>
    <div id="bg-pattern" aria-hidden="true"></div>
    <div id="root">
      <div id="boot-skeleton" aria-hidden="true">
        <div class="boot-bar" style="height: 56px"></div>
        <div class="boot-content">
          <div class="boot-title"></div>
          <div class="boot-search"></div>
          <div class="boot-list">
            <div class="boot-row">
              <div class="boot-icon"></div>
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
                <div class="boot-line lg"></div>
                <div class="boot-line sm"></div>
              </div>
            </div>
            <div class="boot-row">
              <div class="boot-icon"></div>
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
                <div class="boot-line md"></div>
                <div class="boot-line sm"></div>
              </div>
            </div>
            <div class="boot-row">
              <div class="boot-icon"></div>
              <div style="flex: 1; display: flex; flex-direction: column; gap: 8px">
                <div class="boot-line lg"></div>
                <div class="boot-line sm"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="boot-tabbar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
